<style>
  .feedback-form {

    min-height: 80px;
    border: 1px solid #bdbdbd;
    border-radius: 6px;
    padding: 8px;
    resize: vertical;
  }
  .feedback-form button, .feedback-form input[type="reset"] {
    background-color: #0288d1;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    margin-right: 10px;
    cursor: pointer;
    font-size: 1em;
  }
  .feedback-form button[type="reset"] {
    background-color: #c62828;
  }
  .feedback-form label, .feedback-form legend {
    font-weight: 500;
  }
</style>

<form class="feedback-form">
  <label for="topic">What would you like to give feedback on?</label><br>
  <select id="topic" name="topic" required>
    <option value="">--Please choose an option--</option>
    <option value="website">Website Design</option>
    <option value="content">Content Quality</option>
    <option value="usability">Usability</option>
    <option value="other">Other</option>
  </select>

  <fieldset>
    <legend>How satisfied are you with your experience?</legend>

    <input type="radio" id="satisfied" name="satisfaction" value="satisfied">
    <label for="satisfied">Satisfied</label><br>
    <input type="radio" id="neutral" name="satisfaction" value="neutral">

    <input type="radio" id="unsatisfied" name="satisfaction" value="unsatisfied">
    <label for="unsatisfied">Unsatisfied</label><br>
    <input type="radio" id="very-unsatisfied" name="satisfaction" value="very-unsatisfied">
    <label for="very-unsatisfied">Very Unsatisfied</label>
  </fieldset>

  <label for="comments">Additional Comments:</label><br>
  <textarea id="comments" name="comments" placeholder="Type your feedback here..."></textarea>
  <br><br>

  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
</form>
